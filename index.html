<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Planner — Direct Soccer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F1EFE8;--surface:#fff;--surface-2:#F7F5F1;--surface-3:#EEECEA;
  --border:rgba(0,0,0,0.07);--border-2:rgba(0,0,0,0.14);
  --text:#18181A;--text-2:#5A5957;--text-3:#9C9A96;
  --accent:#185FA5;--accent-2:#0C447C;--accent-bg:#EAF3FC;
  --r:8px;--r-lg:12px;--r-xl:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* Header */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:200}
.hd-left{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo i{color:#fff;font-size:17px}
.hd-name{font-size:15px;font-weight:600;letter-spacing:-0.01em}
.hd-sub{font-size:11px;color:var(--text-3);margin-top:1px}
.hd-right{display:flex;align-items:center;gap:10px}
.last-upd{font-size:12px;color:var(--text-3)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:background .12s,opacity .12s}
.btn i{font-size:15px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-2)}
.btn-outline{background:none;border:1px solid var(--border-2);color:var(--text-2)}
.btn-outline:hover{background:var(--surface-2)}

/* Container */
.page{max-width:1200px;margin:0 auto;padding:24px 28px}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 18px}
.stat-lbl{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600;letter-spacing:-0.02em}
.stat.overdue{background:#FEF2F1;border-color:#F5C4C1;cursor:pointer;transition:background .1s}
.stat.overdue:hover{background:#FDEBE9}
.stat.overdue .stat-lbl{color:#9B3A35}
.stat.overdue .stat-val{color:#C0392B}
.stat.overdue .stat-cta{font-size:11px;color:#C0392B;margin-top:4px;display:flex;align-items:center;gap:3px}
/* Overdue panel */
.overdue-panel{background:var(--surface);border:1.5px solid #F5C4C1;border-radius:var(--r-xl);margin-bottom:24px;overflow:hidden;display:none}
.overdue-panel.open{display:block}
.overdue-ph{background:#FEF2F1;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F5C4C1}
.overdue-ph-title{font-size:14px;font-weight:600;color:#C0392B;display:flex;align-items:center;gap:8px}
.overdue-ph-meta{font-size:12px;color:#9B3A35}
.overdue-body{padding:20px 22px}
.ov-vendor{margin-bottom:18px}
.ov-vendor:last-child{margin-bottom:0}
.ov-vendor-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ov-badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:9999px}
.ov-vendor-meta{font-size:11px;color:var(--text-3)}
table.ov-t{width:100%;border-collapse:collapse;font-size:12px}
table.ov-t th{text-align:left;color:var(--text-3);font-weight:500;padding:3px 8px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:0.03em}
table.ov-t td{padding:4px 8px;border-bottom:1px solid var(--border)}
table.ov-t tr:last-child td{border-bottom:none}
.ov-t .tr{text-align:right;font-variant-numeric:tabular-nums}
.ov-t .overdue-days{color:#C0392B;font-weight:500}

/* Section */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:22px;margin-bottom:24px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.nav-group{display:flex;align-items:center;gap:6px}
.nav-btn{background:none;border:1px solid var(--border-2);border-radius:var(--r);padding:5px 9px;cursor:pointer;color:var(--text-2);font-size:13px;font-family:inherit;display:flex;align-items:center;gap:4px;transition:background .1s}
.nav-btn:hover{background:var(--surface-2)}
.nav-lbl{font-size:13px;font-weight:500;min-width:200px;text-align:center;color:var(--text)}

/* Chart */
.chart-wrap{position:relative;height:320px}
.week-meta{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.wm-day{text-align:center;padding:6px 4px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:background .1s}
.wm-day:hover{background:var(--surface-2)}
.wm-day.selected{background:var(--accent-bg);border-color:rgba(24,95,165,0.2)}
.wm-day.today{border-color:var(--accent)}
.wm-lbl{font-size:10px;color:var(--text-3);font-weight:500;text-transform:uppercase}
.wm-qty{font-size:13px;font-weight:600;letter-spacing:-0.01em}
.wm-pos{font-size:10px;color:var(--text-3)}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2)}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Calendar */
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
.cal-hdr-day{text-align:center;font-size:10px;font-weight:600;color:var(--text-3);padding:4px;text-transform:uppercase;letter-spacing:0.06em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.day{background:var(--surface);min-height:78px;padding:6px 5px;cursor:pointer;transition:background .08s}
.day:hover{background:var(--surface-2)}
.day.empty{background:var(--surface-3);cursor:default}
.day.today{outline:2px solid var(--accent);outline-offset:-2px}
.day.selected{background:var(--accent-bg)}
.day-n{font-size:11px;font-weight:500;color:var(--text-2);margin-bottom:3px}
.day.today .day-n{color:var(--accent);font-weight:700}
.v-pills{display:flex;flex-direction:column;gap:2px}
.v-pill{font-size:10px;padding:1px 5px;border-radius:9999px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-more{font-size:10px;color:var(--text-3);padding-left:3px}

/* Detail panel */
.detail{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.detail-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;gap:12px}
.detail-date{font-size:14px;font-weight:600}
.detail-summary{font-size:12px;color:var(--text-2);text-align:right}
.vs{margin-bottom:14px}
.vs:last-child{margin-bottom:0}
.vs-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.vs-badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:9999px}
.vs-meta{font-size:11px;color:var(--text-3)}
table.po-t{width:100%;border-collapse:collapse;font-size:12px}
table.po-t th{text-align:left;color:var(--text-3);font-weight:500;padding:3px 8px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:0.03em}
table.po-t td{padding:4px 8px;border-bottom:1px solid var(--border)}
table.po-t tr:last-child td{border-bottom:none}
.tr{text-align:right;font-variant-numeric:tabular-nums}
.no-data{text-align:center;padding:32px;color:var(--text-3);font-size:13px}

/* Upload hint */
.upload-hint{background:var(--surface);border:1.5px dashed var(--border-2);border-radius:var(--r-xl);padding:36px;text-align:center;margin-bottom:24px;display:none}
.upload-hint.show{display:block}
.upload-hint h3{font-size:15px;font-weight:600;margin-bottom:6px}
.upload-hint p{font-size:13px;color:var(--text-3);margin-bottom:16px}

/* Reserved stock view */
.res-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.res-toggles{display:flex;gap:6px}
.res-toggle-btn{padding:5px 12px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border-2);background:none;color:var(--text-2);font-family:inherit;transition:all .1s}
.res-toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.res-filters{display:flex;gap:5px}
.res-filter-btn{padding:4px 10px;border-radius:9999px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border-2);background:none;color:var(--text-2);font-family:inherit;transition:all .1s}
.res-filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.res-filter-btn.active.f-overdue{background:#C0392B;border-color:#C0392B}
.res-filter-btn.active.f-special{background:#185FA5;border-color:#185FA5}
.res-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.res-sum-card{background:var(--surface-2);border-radius:var(--r-lg);padding:12px 14px;border:1px solid var(--border)}
.res-sum-card.alert{background:#FEF2F1;border-color:#F5C4C1}
.res-sum-lbl{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.res-sum-val{font-size:18px;font-weight:600}
.res-sum-card.alert .res-sum-val{color:#C0392B}
.res-placeholder{text-align:center;padding:40px 20px;color:var(--text-3)}
.res-placeholder i{font-size:32px;display:block;margin-bottom:10px;opacity:0.4}
.res-placeholder p{font-size:13px;line-height:1.6}
/* Group rows */
.rg{border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden}
.rg-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--surface-2);gap:8px;transition:background .1s}
.rg-hdr:hover{background:var(--surface-3)}
.rg-hdr-left{display:flex;align-items:center;gap:8px;min-width:0}
.rg-badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:9999px;flex-shrink:0}
.rg-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rg-hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.rg-meta{font-size:11px;color:var(--text-3)}
.rg-chevron{font-size:14px;color:var(--text-3);transition:transform .15s}
.rg.open .rg-chevron{transform:rotate(180deg)}
.rg-alert{font-size:10px;font-weight:600;padding:2px 7px;border-radius:9999px;background:#FEF2F1;color:#C0392B;border:1px solid #F5C4C1}
.rg-body{display:none;padding:0}
.rg.open .rg-body{display:block}
table.res-t{width:100%;border-collapse:collapse;font-size:12px}
table.res-t th{text-align:left;color:var(--text-3);font-weight:500;padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:0.03em;position:sticky;top:0;background:var(--surface)}
table.res-t td{padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
table.res-t tr:last-child td{border-bottom:none}
table.res-t tr:hover td{background:var(--surface-2)}
.res-t .tr{text-align:right;font-variant-numeric:tabular-nums}
.s-overdue{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:#FEF2F1;color:#C0392B;border:1px solid #F5C4C1}
.s-today{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:#FEFBE6;color:#854F0B;border:1px solid #F0D98C}
.s-soon{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--accent-bg);color:var(--accent);border:1px solid rgba(24,95,165,0.2)}
.s-future{font-size:11px;color:var(--text-2)}
.so-ref{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;background:var(--accent-bg);color:var(--accent);font-variant-numeric:tabular-nums}
.desc-cell{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .page{padding:16px}
  .app-header{padding:0 16px}
  .hd-sub,.last-upd{display:none}
  .nav-lbl{min-width:140px;font-size:12px}
  .res-summary{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="hd-left">
    <div class="logo"><i class="ti ti-package"></i></div>
    <div>
      <div class="hd-name">Delivery Planner</div>
      <div class="hd-sub">Direct Soccer · Warehouse Operations</div>
    </div>
  </div>
  <div class="hd-right">
    <span class="last-upd" id="last-upd">Default data loaded</span>
    <label class="btn btn-primary" for="file-inp" style="cursor:pointer">
      <i class="ti ti-upload"></i> Upload Excel
    </label>
    <input type="file" id="file-inp" accept=".xlsx,.xls" style="display:none" onchange="handleUpload(this)">
  </div>
</header>

<div class="page">

  <div class="stats-row" id="stats-row"></div>

  <!-- Overdue panel -->
  <div class="overdue-panel" id="overdue-panel">
    <div class="overdue-ph">
      <span class="overdue-ph-title"><i class="ti ti-alert-triangle"></i> Overdue purchase orders</span>
      <span class="overdue-ph-meta" id="overdue-ph-meta"></span>
    </div>
    <div class="overdue-body" id="overdue-body"></div>
  </div>

  <!-- Weekly chart -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Weekly delivery forecast</span>
      <div class="nav-group">
        <button class="nav-btn" onclick="changeWeek(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="nav-lbl" id="week-lbl"></span>
        <button class="nav-btn" onclick="changeWeek(1)"><i class="ti ti-chevron-right"></i></button>
        <button class="nav-btn" onclick="goWeekToday()" style="margin-left:2px">This week</button>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="week-chart" role="img" aria-label="Stacked bar chart of planned deliveries by vendor for the selected week"></canvas>
    </div>
    <div class="week-meta" id="week-meta"></div>
    <div class="chart-legend" id="chart-legend"></div>
  </div>

  <!-- Calendar -->
  <div class="card" id="cal-card">
    <div class="card-header">
      <span class="card-title">Monthly calendar</span>
      <div class="nav-group">
        <button class="nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="nav-lbl" id="month-lbl"></span>
        <button class="nav-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
        <button class="nav-btn" onclick="goMonthToday()" style="margin-left:2px">Today</button>
      </div>
    </div>
    <div class="cal-hdr">
      <div class="cal-hdr-day">Mon</div><div class="cal-hdr-day">Tue</div>
      <div class="cal-hdr-day">Wed</div><div class="cal-hdr-day">Thu</div>
      <div class="cal-hdr-day">Fri</div><div class="cal-hdr-day">Sat</div>
      <div class="cal-hdr-day">Sun</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="day-detail"></div>
  </div>

  <!-- Reserved stock -->
  <div class="card" id="reserved-card">
    <div class="card-header">
      <span class="card-title"><i class="ti ti-lock" style="font-size:15px;vertical-align:-2px;margin-right:5px"></i>Reserved stock tracker</span>
      <div class="res-toggles">
        <button class="res-toggle-btn active" id="btn-by-vendor" onclick="switchResMode('vendor')">By vendor</button>
        <button class="res-toggle-btn" id="btn-by-customer" onclick="switchResMode('customer')">By customer order</button>
      </div>
    </div>
    <div class="res-summary" id="res-summary"></div>
    <div class="res-filters" style="margin-bottom:14px">
      <button class="res-filter-btn active" id="rf-all" onclick="switchResFilter('all')">All reserved</button>
      <button class="res-filter-btn f-overdue" id="rf-overdue" onclick="switchResFilter('overdue')">Overdue only</button>
      <button class="res-filter-btn f-special" id="rf-special" onclick="switchResFilter('special')">Special orders</button>
    </div>
    <div id="res-content"></div>
  </div>

</div><!-- /page -->

<script>
// ── Vendor colours ────────────────────────────────────────────────
const VC = {
  NIKE01:{bg:'#E6F1FB',tx:'#0C447C',ch:'#185FA5'},
  SPOR25:{bg:'#E1F5EE',tx:'#085041',ch:'#0F6E56'},
  MIT50: {bg:'#EEEDFE',tx:'#3C3489',ch:'#534AB7'},
  JOM94: {bg:'#FAECE7',tx:'#712B13',ch:'#993C1D'},
  PUMA21:{bg:'#FBEAF0',tx:'#72243E',ch:'#993556'},
  REYD22:{bg:'#FAEEDA',tx:'#633806',ch:'#854F0B'},
  STAN03:{bg:'#EAF3DE',tx:'#27500A',ch:'#3B6D11'},
  KOOL57:{bg:'#F1EFE8',tx:'#444441',ch:'#5F5E5A'},
  TREN08:{bg:'#FCEBEB',tx:'#791F1F',ch:'#A32D2D'},
  ADPA44:{bg:'#E1F5EE',tx:'#0F6E56',ch:'#1D9E75'},
  ELEM50:{bg:'#EEEDFE',tx:'#534AB7',ch:'#7F77DD'},
  UKST55:{bg:'#FBEAF0',tx:'#993556',ch:'#D4537E'},
  MTMK69:{bg:'#F1EFE8',tx:'#5F5E5A',ch:'#888780'},
  PRES06:{bg:'#E6F1FB',tx:'#185FA5',ch:'#378ADD'},
  MPSL25:{bg:'#EAF3DE',tx:'#3B6D11',ch:'#639922'},
  UNEE05:{bg:'#FAEEDA',tx:'#854F0B',ch:'#BA7517'},
  WMWA90:{bg:'#FCEBEB',tx:'#A32D2D',ch:'#E24B4A'},
  GUJRA1:{bg:'#FAECE7',tx:'#993C1D',ch:'#D85A30'},
};

// ── Helpers ───────────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,'0');}
function fmtDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function getMonday(d){const r=new Date(d);const dow=(r.getDay()+6)%7;r.setDate(r.getDate()-dow);r.setHours(0,0,0,0);return r;}
function num(n){return n.toLocaleString('en-GB');}

// ── Data processing ───────────────────────────────────────────────
function loadFromRaw(raw){
  // raw = [[date,vendor,po,qty,lines],...]
  byDate={};
  raw.forEach(([d,v,p,q,l])=>{
    if(!byDate[d])byDate[d]={};
    if(!byDate[d][v])byDate[d][v]=[];
    byDate[d][v].push({po:p,qty:+q,lines:+l});
  });
}

function loadFromExcelRows(rows){
  // rows = objects from XLSX.utils.sheet_to_json
  const tmp={};
  rows.forEach(row=>{
    const vendor=String(row['Buy-from Vendor No.']||'').trim();
    const po=String(row['Document No.']||'').trim();
    const lineItem=String(row['No.']||'').trim();
    const qtyRaw=row['Outstanding Quantity'];
    const qty=parseFloat(qtyRaw)||0;
    let dateRaw=row['Expected Receipt Date'];
    if(!vendor||!po||!dateRaw||qty<=0)return;
    let dateStr;
    if(dateRaw instanceof Date){
      dateStr=fmtDate(dateRaw);
    } else {
      dateStr=String(dateRaw).replace(/T.*/,'').substring(0,10);
    }
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dateStr))return;
    const key=`${dateStr}||${vendor}||${po}`;
    if(!tmp[key])tmp[key]={vendor,po,date:dateStr,qty:0,lines:0};
    tmp[key].qty+=qty;
    tmp[key].lines++;
  });
  byDate={};
  Object.values(tmp).forEach(({vendor,po,date,qty,lines})=>{
    if(!byDate[date])byDate[date]={};
    if(!byDate[date][vendor])byDate[date][vendor]=[];
    byDate[date][vendor].push({po,qty:Math.round(qty),lines});
  });
  // ── Extract reserved items ──────────────────────────────────────
  const todayKey=fmtDate(TODAY);
  reservedItems=[];
  rows.forEach(row=>{
    const resQty=parseFloat(row['Reserved Quantity']||0);
    if(resQty<=0)return;
    const vendor=String(row['Buy-from Vendor No.']||'').trim();
    const po=String(row['Document No.']||'').trim();
    const itemNo=String(row['No.']||'').trim();
    const desc=String(row['Description']||'').trim();
    const outQty=parseFloat(row['Outstanding Quantity']||0);
    const isSpecialOrder=!!(parseInt(row['Special Order'])||0);
    const salesOrderNo=isSpecialOrder?String(row['Special Order Sales No.']||'').trim():'';
    let dateRaw=row['Expected Receipt Date'];
    let dateStr;
    if(dateRaw instanceof Date){dateStr=fmtDate(dateRaw);}
    else{dateStr=String(dateRaw).replace(/T.*/,'').substring(0,10);}
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dateStr))return;
    const overdue=dateStr<todayKey;
    const daysOver=overdue?Math.round((TODAY-new Date(dateStr+'T00:00:00'))/(1000*60*60*24)):0;
    reservedItems.push({vendor,po,itemNo,desc,date:dateStr,outQty:Math.round(outQty),resQty:Math.round(resQty),isSpecialOrder,salesOrderNo,overdue,daysOver});
  });
}

// ── File upload ───────────────────────────────────────────────────
async function handleUpload(input){
  const file=input.files[0];
  if(!file)return;
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true,raw:false,dateNF:'yyyy-mm-dd'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{raw:false,dateNF:'yyyy-mm-dd'});
    if(!rows.length){alert('No data rows found in the file.');return;}
    loadFromExcelRows(rows);
    const ts=new Date().toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-upd').textContent=`${file.name} · ${rows.length} rows · ${ts}`;
    refreshAll();
  }catch(e){
    alert('Could not read the file. Make sure it is an .xlsx export from Business Central.\n\n'+e.message);
    console.error(e);
  }
  input.value='';
}

// ── Overview stats ────────────────────────────────────────────────
function getOverdueData(){
  const todayKey=fmtDate(TODAY);
  const result={}; // {vendor:[{po,qty,lines,date,daysOverdue}]}
  Object.entries(byDate).forEach(([d,vendors])=>{
    if(d>=todayKey)return;
    const daysOver=Math.round((TODAY-new Date(d+'T00:00:00'))/(1000*60*60*24));
    Object.entries(vendors).forEach(([v,pos])=>{
      if(!result[v])result[v]=[];
      pos.forEach(p=>result[v].push({...p,date:d,daysOver}));
    });
  });
  return result;
}

  const hasOverdue=ovPOs.size>0;
  const ovCard=hasOverdue
    ? `<div class="stat overdue" onclick="toggleOverdue()" role="button" aria-expanded="false" id="overdue-stat">
        <div class="stat-lbl">Overdue POs</div>
        <div class="stat-val">${num(ovPOs.size)}</div>
        <div class="stat-cta"><i class="ti ti-chevron-down" id="overdue-chevron"></i>${num(ovLines)} lines · ${num(ovQty)} units</div>
      </div>`
    : `<div class="stat"><div class="stat-lbl">Overdue POs</div><div class="stat-val" style="color:var(--text-3)">None</div></div>`;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="stat-lbl">Total units outstanding</div><div class="stat-val">${num(totalQty)}</div></div>
    <div class="stat"><div class="stat-lbl">Total PO lines</div><div class="stat-val">${num(totalLines)}</div></div>
    <div class="stat"><div class="stat-lbl">Open purchase orders</div><div class="stat-val">${num(totalPOs.size)}</div></div>
    ${ovCard}`;
  overdueOpen=false;
  const op=document.getElementById('overdue-panel');
  if(op)op.classList.remove('open');
}

let overdueOpen=false;
function toggleOverdue(){
  overdueOpen=!overdueOpen;
  const panel=document.getElementById('overdue-panel');
  const chevron=document.getElementById('overdue-chevron');
  const stat=document.getElementById('overdue-stat');
  panel.classList.toggle('open',overdueOpen);
  if(chevron)chevron.style.transform=overdueOpen?'rotate(180deg)':'';
  if(stat)stat.setAttribute('aria-expanded',overdueOpen);
  if(overdueOpen)renderOverduePanel();
}

function renderOverduePanel(){
  const ov=getOverdueData();
  let totalPOs=new Set(),totalLines=0,totalQty=0;
  let blocks='';
  Object.entries(ov).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([v,pos])=>{
    const c=gvc(v);
    const vQty=pos.reduce((a,p)=>a+p.qty,0);
    const vLines=pos.reduce((a,p)=>a+p.lines,0);
    const vPOs=new Set(pos.map(p=>p.po));
    totalQty+=vQty;totalLines+=vLines;pos.forEach(p=>totalPOs.add(p.po));
    // Sort by date ascending (oldest first)
    const sorted=[...pos].sort((a,b)=>a.date.localeCompare(b.date));
    const rows=sorted.map(p=>`<tr>
      <td>${p.po}</td>
      <td>${new Date(p.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</td>
      <td class="tr overdue-days">${p.daysOver}d overdue</td>
      <td class="tr">${num(p.qty)}</td>
      <td class="tr">${p.lines}</td>
    </tr>`).join('');
    blocks+=`<div class="ov-vendor">
      <div class="ov-vendor-hdr">
        <span class="ov-badge" style="background:${c.bg};color:${c.tx}">${v}</span>
        <span class="ov-vendor-meta">${vPOs.size} PO${vPOs.size>1?'s':''} · ${num(vQty)} units · ${vLines} lines</span>
      </div>
      <table class="ov-t">
        <thead><tr><th>PO number</th><th>Expected date</th><th style="text-align:right">Status</th><th style="text-align:right">Units</th><th style="text-align:right">Lines</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });
  document.getElementById('overdue-ph-meta').textContent=`${num(totalPOs.size)} POs · ${num(totalLines)} lines · ${num(totalQty)} units`;
  document.getElementById('overdue-body').innerHTML=blocks||'<div style="color:var(--text-3);font-size:13px">No overdue POs</div>';
}

// ── Week chart ────────────────────────────────────────────────────
function getWeekDates(){
  return Array.from({length:7},(_,i)=>addDays(weekStart,i));
}

function renderWeekLabel(){
  const days=getWeekDates();
  const s=days[0].toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const e=days[6].toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('week-lbl').textContent=`${s} – ${e}`;
}

function renderWeekChart(){
  const days=getWeekDates();
  const keys=days.map(d=>fmtDate(d));
  const todayKey=fmtDate(TODAY);

  // Gather vendors active this week
  const vendorSet=new Set();
  keys.forEach(k=>{if(byDate[k])Object.keys(byDate[k]).forEach(v=>vendorSet.add(v));});
  const vendors=Array.from(vendorSet).sort();

  const labels=days.map(d=>d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}));

  const datasets=vendors.map(v=>({
    label:v,
    data:keys.map(k=>byDate[k]&&byDate[k][v]?byDate[k][v].reduce((a,p)=>a+p.qty,0):0),
    backgroundColor:gvc(v).ch,
    borderWidth:0,
    borderRadius:3,
  }));

  if(weekChart)weekChart.destroy();
  const ctx=document.getElementById('week-chart');
  weekChart=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          mode:'index',intersect:false,
          callbacks:{
            title:items=>items[0].label,
            label:item=>item.raw>0?`${item.dataset.label}: ${num(item.raw)} units`:'',
            afterBody:items=>{
              const k=keys[items[0].dataIndex];
              if(!byDate[k])return[];
              const total=Object.values(byDate[k]).flat().reduce((a,p)=>a+p.qty,0);
              return[`─────────────`,`Total: ${num(total)} units`];
            }
          }
        }
      },
      scales:{
        x:{stacked:true,grid:{display:false},ticks:{font:{size:11}}},
        y:{stacked:true,beginAtZero:true,grid:{color:'rgba(0,0,0,0.05)'},
          ticks:{font:{size:11},callback:v=>v>=1000?(v/1000).toFixed(v%1000===0?0:1)+'k':v}}
      },
      onClick:(evt,elements)=>{
        if(elements.length>0){
          const k=keys[elements[0].index];
          selectDay(k);
          document.getElementById('cal-card').scrollIntoView({behavior:'smooth',block:'start'});
        }
      },
      onHover:(e,el)=>{e.native.target.style.cursor=el.length?'pointer':'default';}
    }
  });

  // Week meta bar
  const meta=document.getElementById('week-meta');
  meta.innerHTML=keys.map(k=>{
    const d=byDate[k];
    const isToday=k===todayKey;
    const isSel=k===selectedDate;
    const totalQty=d?Object.values(d).flat().reduce((a,p)=>a+p.qty,0):0;
    const totalPOs=d?Object.values(d).flat().length:0;
    const cls='wm-day'+(isToday?' today':'')+(isSel?' selected':'');
    return `<div class="${cls}" onclick="selectDayFromChart('${k}')">
      <div class="wm-lbl">${new Date(k+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short'})}</div>
      <div class="wm-qty" style="color:${totalQty>0?'#18181A':'#9C9A96'}">${totalQty>0?num(totalQty):'—'}</div>
      <div class="wm-pos">${totalPOs>0?totalPOs+' PO'+(totalPOs>1?'s':''):''}</div>
    </div>`;
  }).join('');

  // Legend
  const legend=document.getElementById('chart-legend');
  if(vendors.length===0){legend.innerHTML='<span style="font-size:12px;color:#9C9A96">No deliveries this week</span>';return;}
  legend.innerHTML=vendors.map(v=>{
    const weekQty=keys.reduce((a,k)=>a+(byDate[k]&&byDate[k][v]?byDate[k][v].reduce((s,p)=>s+p.qty,0):0),0);
    return `<div class="leg-item"><span class="leg-dot" style="background:${gvc(v).ch}"></span>${v} <span style="color:#9C9A96;margin-left:2px">${num(weekQty)}</span></div>`;
  }).join('');
}

function selectDayFromChart(k){
  selectDay(k);
  const d=new Date(k+'T00:00:00');
  calYear=d.getFullYear();calMonth=d.getMonth();
  renderCalendar();
  document.getElementById('cal-card').scrollIntoView({behavior:'smooth',block:'start'});
}

function changeWeek(dir){weekStart=addDays(weekStart,dir*7);renderWeekLabel();renderWeekChart();}
function goWeekToday(){weekStart=getMonday(TODAY);renderWeekLabel();renderWeekChart();}

// ── Calendar ──────────────────────────────────────────────────────
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCalendar(){
  document.getElementById('month-lbl').textContent=`${MONTHS[calMonth]} ${calYear}`;
  const firstDay=new Date(calYear,calMonth,1);
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const startDow=(firstDay.getDay()+6)%7;
  const todayKey=fmtDate(TODAY);
  let html='';
  for(let i=0;i<startDow;i++)html+=`<div class="day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const k=`${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const isToday=k===todayKey,isSel=k===selectedDate;
    const data=byDate[k];
    let cls='day'+(isToday?' today':'')+(isSel?' selected':'');
    let inner=`<div class="day-n">${d}</div>`;
    if(data){
      const vendors=Object.keys(data);
      inner+=`<div class="v-pills">`;
      vendors.slice(0,3).forEach(v=>{
        const q=data[v].reduce((a,p)=>a+p.qty,0);
        const c=gvc(v);
        inner+=`<div class="v-pill" style="background:${c.bg};color:${c.tx}">${v} ${num(q)}</div>`;
      });
      if(vendors.length>3)inner+=`<div class="v-more">+${vendors.length-3} more</div>`;
      inner+=`</div>`;
    }
    html+=`<div class="${cls}" onclick="selectDay('${k}')">${inner}</div>`;
  }
  const total=startDow+daysInMonth;
  for(let i=0;i<(7-(total%7))%7;i++)html+=`<div class="day empty"></div>`;
  document.getElementById('cal-grid').innerHTML=html;
  renderDetail();
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function goMonthToday(){calYear=TODAY.getFullYear();calMonth=TODAY.getMonth();renderCalendar();}

// ── Day detail ────────────────────────────────────────────────────
function selectDay(k){
  selectedDate=selectedDate===k?null:k;
  renderCalendar();
  renderWeekChart();
}

function renderDetail(){
  const el=document.getElementById('day-detail');
  if(!selectedDate||!byDate[selectedDate]){el.innerHTML='';return;}
  const data=byDate[selectedDate];
  const dt=new Date(selectedDate+'T00:00:00');
  const label=dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let tQty=0,tLines=0,tPOs=0;
  let blocks='';
  Object.entries(data).sort((a,b)=>b[1].reduce((s,p)=>s+p.qty,0)-a[1].reduce((s,p)=>s+p.qty,0)).forEach(([v,pos])=>{
    const c=gvc(v);
    const vQty=pos.reduce((a,p)=>a+p.qty,0);
    const vLines=pos.reduce((a,p)=>a+p.lines,0);
    tQty+=vQty;tLines+=vLines;tPOs+=pos.length;
    const rows=pos.sort((a,b)=>b.qty-a.qty).map(p=>`<tr><td>${p.po}</td><td class="tr">${num(p.qty)}</td><td class="tr">${p.lines}</td></tr>`).join('');
    blocks+=`<div class="vs">
      <div class="vs-hdr">
        <span class="vs-badge" style="background:${c.bg};color:${c.tx}">${v}</span>
        <span class="vs-meta">${num(vQty)} units · ${pos.length} PO${pos.length>1?'s':''} · ${vLines} lines</span>
      </div>
      <table class="po-t">
        <thead><tr><th>PO number</th><th style="text-align:right">Units</th><th style="text-align:right">Lines</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });
  el.innerHTML=`<div class="detail">
    <div class="detail-hdr">
      <span class="detail-date">${label}</span>
      <span class="detail-summary">${num(tQty)} units &nbsp;·&nbsp; ${tPOs} PO${tPOs>1?'s':''} &nbsp;·&nbsp; ${tLines} lines</span>
    </div>
    ${blocks}
  </div>`;
}

// ── Reserved stock view ───────────────────────────────────────────
function statusBadge(item){
  if(item.overdue)return `<span class="s-overdue">${item.daysOver}d overdue</span>`;
  const days=Math.round((new Date(item.date+'T00:00:00')-TODAY)/(1000*60*60*24));
  if(days===0)return `<span class="s-today">Due today</span>`;
  if(days<=7)return `<span class="s-soon">In ${days}d</span>`;
  return `<span class="s-future">${new Date(item.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>`;
}

function filteredReserved(){
  return reservedItems.filter(it=>{
    if(resFilter==='overdue')return it.overdue;
    if(resFilter==='special')return it.isSpecialOrder;
    return true;
  });
}

function renderResSummary(){
  const all=reservedItems;
  const totalRes=all.reduce((a,i)=>a+i.resQty,0);
  const overdueCount=all.filter(i=>i.overdue).length;
  const overdueQty=all.filter(i=>i.overdue).reduce((a,i)=>a+i.resQty,0);
  const soOrders=new Set(all.filter(i=>i.isSpecialOrder&&i.salesOrderNo).map(i=>i.salesOrderNo)).size;
  const soOverdue=new Set(all.filter(i=>i.isSpecialOrder&&i.overdue&&i.salesOrderNo).map(i=>i.salesOrderNo)).size;
  document.getElementById('res-summary').innerHTML=`
    <div class="res-sum-card"><div class="res-sum-lbl">Total reserved units</div><div class="res-sum-val">${num(totalRes)}</div></div>
    <div class="res-sum-card${overdueCount>0?' alert':''}"><div class="res-sum-lbl">Overdue reserved lines</div><div class="res-sum-val">${num(overdueCount)}<span style="font-size:13px;font-weight:400;color:var(--text-3);margin-left:4px">(${num(overdueQty)} units)</span></div></div>
    <div class="res-sum-card${soOverdue>0?' alert':''}"><div class="res-sum-lbl">Customer orders affected</div><div class="res-sum-val">${num(soOrders)}<span style="font-size:13px;font-weight:400;color:var(--text-3);margin-left:4px">${soOverdue>0?`(${num(soOverdue)} overdue)`:''}</span></div></div>`;
}

function switchResMode(mode){
  resMode=mode;resOpenGroups=new Set();
  document.getElementById('btn-by-vendor').classList.toggle('active',mode==='vendor');
  document.getElementById('btn-by-customer').classList.toggle('active',mode==='customer');
  renderResContent();
}

function switchResFilter(f){
  resFilter=f;resOpenGroups=new Set();
  ['all','overdue','special'].forEach(x=>document.getElementById('rf-'+x).classList.toggle('active',x===f));
  renderResContent();
}

function toggleResGroup(id){
  if(resOpenGroups.has(id))resOpenGroups.delete(id);else resOpenGroups.add(id);
  const el=document.getElementById('rg-'+id);
  if(el)el.classList.toggle('open',resOpenGroups.has(id));
}

function renderResContent(){
  const el=document.getElementById('res-content');
  const items=filteredReserved();
  if(!items.length){
    if(!reservedItems.length){
      el.innerHTML=`<div class="res-placeholder"><i class="ti ti-file-upload"></i><p>Upload your Outstanding Purchases Excel export to see reserved stock data.<br>Reserved items are automatically extracted from the file.</p></div>`;
    } else {
      el.innerHTML=`<div class="res-placeholder"><i class="ti ti-check"></i><p>No items match the current filter.</p></div>`;
    }
    return;
  }
  if(resMode==='vendor')renderResByVendor(items,el);
  else renderResByCustomer(items,el);
}

function renderResByVendor(items,el){
  // Group: vendor → po → items
  const groups={};
  items.forEach(it=>{
    if(!groups[it.vendor])groups[it.vendor]={items:[],overdueCount:0,resQty:0,pos:new Set()};
    groups[it.vendor].items.push(it);
    groups[it.vendor].pos.add(it.po);
    groups[it.vendor].resQty+=it.resQty;
    if(it.overdue)groups[it.vendor].overdueCount++;
  });
  let html='';
  Object.entries(groups).sort((a,b)=>b[1].overdueCount-a[1].overdueCount||b[1].resQty-a[1].resQty).forEach(([v,g])=>{
    const c=gvc(v);
    const id='v-'+v;
    const isOpen=resOpenGroups.has(id);
    const overdueTag=g.overdueCount>0?`<span class="rg-alert"><i class="ti ti-alert-triangle" style="font-size:10px"></i> ${g.overdueCount} overdue</span>`:'';
    // Sort items: overdue first, then by date
    const sorted=[...g.items].sort((a,b)=>(b.overdue?1:0)-(a.overdue?1:0)||a.date.localeCompare(b.date));
    const rows=sorted.map(it=>`<tr>
      <td>${it.po}</td>
      <td style="font-size:11px;color:var(--text-3)">${it.itemNo}</td>
      <td class="desc-cell" title="${it.desc}">${it.desc}</td>
      <td class="tr">${num(it.resQty)}</td>
      <td class="tr" style="color:var(--text-3)">${num(it.outQty)}</td>
      <td>${statusBadge(it)}</td>
      <td>${it.isSpecialOrder&&it.salesOrderNo?`<span class="so-ref">${it.salesOrderNo}</span>`:''}</td>
    </tr>`).join('');
    html+=`<div class="rg${isOpen?' open':''}" id="rg-${id}">
      <div class="rg-hdr" onclick="toggleResGroup('${id}')">
        <div class="rg-hdr-left">
          <span class="rg-badge" style="background:${c.bg};color:${c.tx}">${v}</span>
          <span class="rg-meta">${num(g.resQty)} reserved · ${g.pos.size} PO${g.pos.size>1?'s':''} · ${g.items.length} lines</span>
          ${overdueTag}
        </div>
        <i class="ti ti-chevron-down rg-chevron"></i>
      </div>
      <div class="rg-body">
        <table class="res-t">
          <thead><tr><th>PO</th><th>Item no.</th><th>Description</th><th style="text-align:right">Reserved</th><th style="text-align:right">Outstanding</th><th>Status</th><th>Customer order</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function renderResByCustomer(items,el){
  // Only show special orders in this view; group by sales order no
  const specials=items.filter(it=>it.isSpecialOrder&&it.salesOrderNo);
  if(!specials.length){
    el.innerHTML=`<div class="res-placeholder"><i class="ti ti-clipboard-list"></i><p>No special orders found in the current filter.<br>Switch to "By vendor" to see all reserved items.</p></div>`;
    return;
  }
  const groups={};
  specials.forEach(it=>{
    const k=it.salesOrderNo;
    if(!groups[k])groups[k]={items:[],overdue:false,latestDate:'',vendors:new Set(),resQty:0};
    groups[k].items.push(it);
    groups[k].resQty+=it.resQty;
    if(it.overdue)groups[k].overdue=true;
    groups[k].vendors.add(it.vendor);
    if(it.date>groups[k].latestDate)groups[k].latestDate=it.date;
  });
  let html='';
  // Sort: overdue first, then by latest expected date ascending
  Object.entries(groups).sort((a,b)=>(b[1].overdue?1:0)-(a[1].overdue?1:0)||a[1].latestDate.localeCompare(b[1].latestDate)).forEach(([soNo,g])=>{
    const id='so-'+soNo;
    const isOpen=resOpenGroups.has(id);
    const overdueCount=g.items.filter(i=>i.overdue).length;
    const overdueTag=g.overdue?`<span class="rg-alert"><i class="ti ti-alert-triangle" style="font-size:10px"></i> ${overdueCount} line${overdueCount>1?'s':''} overdue</span>`:'';
    const vendorBadges=[...g.vendors].map(v=>{const c=gvc(v);return `<span style="font-size:10px;padding:1px 6px;border-radius:9999px;background:${c.bg};color:${c.tx};font-weight:600;margin-right:2px">${v}</span>`;}).join('');
    const latestFmt=new Date(g.latestDate+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    const sorted=[...g.items].sort((a,b)=>(b.overdue?1:0)-(a.overdue?1:0)||a.date.localeCompare(b.date));
    const rows=sorted.map(it=>{const c=gvc(it.vendor);return`<tr>
      <td><span class="rg-badge" style="background:${c.bg};color:${c.tx};font-size:10px">${it.vendor}</span></td>
      <td>${it.po}</td>
      <td style="font-size:11px;color:var(--text-3)">${it.itemNo}</td>
      <td class="desc-cell" title="${it.desc}">${it.desc}</td>
      <td class="tr">${num(it.resQty)}</td>
      <td>${statusBadge(it)}</td>
    </tr>`;}).join('');
    html+=`<div class="rg${isOpen?' open':''}" id="rg-${id}">
      <div class="rg-hdr" onclick="toggleResGroup('${id}')">
        <div class="rg-hdr-left">
          <span class="so-ref" style="font-size:12px;padding:3px 8px">${soNo}</span>
          <span>${vendorBadges}</span>
          <span class="rg-meta">${num(g.resQty)} units · ${g.items.length} line${g.items.length>1?'s':''} · latest: ${latestFmt}</span>
          ${overdueTag}
        </div>
        <i class="ti ti-chevron-down rg-chevron"></i>
      </div>
      <div class="rg-body">
        <table class="res-t">
          <thead><tr><th>Vendor</th><th>PO</th><th>Item no.</th><th>Description</th><th style="text-align:right">Reserved</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function renderReservedView(){
  renderResSummary();
  renderResContent();
}

// ── Full refresh ──────────────────────────────────────────────────
function refreshAll(){
  renderStats();
  renderWeekLabel();
  renderWeekChart();
  renderCalendar();
  resOpenGroups=new Set();
  renderReservedView();
}

// ── Init ──────────────────────────────────────────────────────────
loadFromRaw(DEFAULT_RAW);
weekStart=getMonday(TODAY);
calYear=TODAY.getFullYear();
calMonth=TODAY.getMonth();
// If today is past all data, jump to last data date
const allDates=Object.keys(byDate).sort();
if(allDates.length){
  const lastDate=new Date(allDates[allDates.length-1]+'T00:00:00');
  const firstDate=new Date(allDates[0]+'T00:00:00');
  if(TODAY>lastDate){
    calYear=lastDate.getFullYear();calMonth=lastDate.getMonth();
    weekStart=getMonday(lastDate);
  } else if(TODAY<firstDate){
    calYear=firstDate.getFullYear();calMonth=firstDate.getMonth();
    weekStart=getMonday(firstDate);
  }
}
refreshAll();
</script>
